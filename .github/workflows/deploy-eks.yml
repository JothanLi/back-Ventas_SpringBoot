name: CI/CD Ventas - EKS

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

  push:
    branches:
      - main
      - deploy

permissions:
  contents: read

concurrency:
  group: ventas-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: back-Ventas_SpringBoot/Springboot-API-REST
  ECR_REPOSITORY: innovatech-ventas
  K8S_NAMESPACE: innovatech

jobs:
  test:
    name: Pruebas y compilación
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ${{ env.APP_DIR }}/pom.xml

      - name: Ejecutar pruebas
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B clean test

      - name: Empaquetar aplicación
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B -DskipTests package

  deploy:
    name: Build, ECR y despliegue EKS

    # Despliega mediante push o ejecución manual.
    # Los pull requests solamente ejecutan el job de pruebas.
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'

    needs:
      - test

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verificar identidad AWS
        run: |
          aws sts get-caller-identity
          aws eks describe-cluster \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --query "cluster.{Nombre:name,Estado:status,Version:version}" \
            --output table

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir imagen trazable
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

          echo "Imagen que será desplegada: $IMAGE_URI"

      - name: Construir imagen Docker
        working-directory: ${{ env.APP_DIR }}
        run: |
          docker build \
            --pull \
            --tag "$IMAGE_URI" \
            .

      - name: Escanear vulnerabilidades críticas
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Publicar imagen en ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push "$IMAGE_URI"

          docker tag \
            "$IMAGE_URI" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          docker push \
            "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.35.0

      - name: Configurar kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Verificar acceso a Kubernetes
        run: |
          kubectl config current-context
          kubectl auth can-i get pods --all-namespaces
          kubectl get namespaces

      - name: Crear namespace y secreto de base de datos
        env:
          DB_NAME: ${{ secrets.MYSQL_DATABASE }}
          DB_USER: ${{ secrets.MYSQL_USER }}
          DB_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          kubectl apply \
            -f "$APP_DIR/k8s/namespace.yaml"

          test -n "$DB_NAME" || {
            echo "Falta el secret MYSQL_DATABASE"
            exit 1
          }

          test -n "$DB_USER" || {
            echo "Falta el secret MYSQL_USER"
            exit 1
          }

          test -n "$DB_PASSWORD" || {
            echo "Falta el secret MYSQL_PASSWORD"
            exit 1
          }

          test -n "$DB_ROOT_PASSWORD" || {
            echo "Falta el secret MYSQL_ROOT_PASSWORD"
            exit 1
          }

          kubectl create secret generic mysql-ventas-secret \
            --namespace "$K8S_NAMESPACE" \
            --from-literal=MYSQL_DATABASE="$DB_NAME" \
            --from-literal=MYSQL_USER="$DB_USER" \
            --from-literal=MYSQL_PASSWORD="$DB_PASSWORD" \
            --from-literal=MYSQL_ROOT_PASSWORD="$DB_ROOT_PASSWORD" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

          echo "Secret mysql-ventas-secret creado o actualizado correctamente."

      - name: Configurar almacenamiento EBS
        run: |
          kubectl apply \
            -f "$APP_DIR/k8s/storage-class.yaml"

          kubectl get storageclass

      - name: Desplegar MySQL Ventas
        run: |
          kubectl create secret generic mysql-ventas-secret \
            --from-literal=MYSQL_DATABASE="${{ secrets.MYSQL_DATABASE }}" \
            --from-literal=MYSQL_USER="${{ secrets.MYSQL_USER }}" \
            --from-literal=MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}" \
            --from-literal=MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}" \
            -n "$K8S_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f "$APP_DIR/k8s/mysql-ventas-deployment.yaml"
          kubectl apply -f "$APP_DIR/k8s/mysql-ventas-service.yaml"

          kubectl rollout status deployment/mysql-ventas \
            --namespace "$K8S_NAMESPACE" \
            --timeout=8m

      - name: Desplegar API de Ventas
        run: |
          sed "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" \
            "$APP_DIR/k8s/ventas-deployment.yaml" |
            kubectl apply -f -

          kubectl apply \
            -f "$APP_DIR/k8s/ventas-service.yaml"

          kubectl rollout status deployment/ventas \
            --namespace "$K8S_NAMESPACE" \
            --timeout=12m

      - name: Smoke test interno
        run: |
          kubectl run "ventas-smoke-${GITHUB_RUN_ID}" \
            --namespace "$K8S_NAMESPACE" \
            --image=curlimages/curl:8.10.1 \
            --restart=Never \
            --rm \
            --attach \
            -- \
            curl \
              --fail \
              --silent \
              --show-error \
              --retry 12 \
              --retry-connrefused \
              --retry-delay 5 \
              http://ventas-service:8080/actuator/health/readiness

      - name: Estado final
        run: |
          echo "=== Deployments ==="
          kubectl get deployments \
            --namespace "$K8S_NAMESPACE"

          echo "=== Pods ==="
          kubectl get pods \
            --namespace "$K8S_NAMESPACE" \
            -o wide

          echo "=== Servicios ==="
          kubectl get services \
            --namespace "$K8S_NAMESPACE"

          echo "=== StatefulSets ==="
          kubectl get statefulsets \
            --namespace "$K8S_NAMESPACE"

          echo "=== Persistencia ==="
          kubectl get pvc \
            --namespace "$K8S_NAMESPACE"

      - name: Diagnóstico en caso de error
        if: failure()
        run: |
          echo "=== Recursos generales ==="
          kubectl get all,pvc \
            --namespace "$K8S_NAMESPACE" || true

          echo "=== Eventos recientes ==="
          kubectl get events \
            --namespace "$K8S_NAMESPACE" \
            --sort-by=.metadata.creationTimestamp || true

          echo "=== Descripción de MySQL ==="
          kubectl describe statefulset/mysql-ventas \
            --namespace "$K8S_NAMESPACE" || true

          echo "=== Descripción de Ventas ==="
          kubectl describe deployment/ventas \
            --namespace "$K8S_NAMESPACE" || true

          echo "=== Logs de MySQL ==="
          kubectl logs statefulset/mysql-ventas \
            --namespace "$K8S_NAMESPACE" \
            --tail=150 || true

          echo "=== Logs de Ventas ==="
          kubectl logs deployment/ventas \
            --namespace "$K8S_NAMESPACE" \
            --tail=150 || true